  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.

        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;

      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.

      // anchors, which closest()/IDL .target get wrong.

            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +

            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +

              'e.preventDefault();' +

              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');

      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.

      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).

      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nherit; width:100%; padding:3px 4px; border-radius:6px; transition:background .12s,box-shadow .12s; }\n    input.es-inp:hover{ background:#FBF1E1; }\n    input.es-inp:focus{ background:#FFF6EA; box-shadow:0 0 0 2px #FFB400; }\n    input.es-num{ font-family:'Space Mono',monospace; text-align:right; }\n    select.es-sel{ font-family:inherit; border:none; background:transparent; outline:none; color:inherit; font-weight:600; cursor:pointer; padding:4px 6px; border-radius:999px; appearance:none; -webkit-appearance:none; transition:background .12s,box-shadow .12s; }\n    select.es-sel:hover{ background:#FBF1E1; }\n    select.es-sel:focus{ box-shadow:0 0 0 2px #FFB400; }\n    .es-del{ opacity:0; transition:opacity .12s; }\n    .es-row:hover .es-del{ opacity:1; }\n    .es-field{ font-family:inherit; font-size:14px; border:1px solid #E6D8C2; background:#FFFFFF; color:#17110A; padding:11px 13px; border-radius:13px; outline:none; transition:box-shadow .12s,border-color .12s; }\n    .es-field:focus{ box-shadow:0 0 0 2px #FFB400; border-color:#FFB400; }\n\n    /* ---- Tablet ---- */\n    @media (max-width:880px){\n      .es-wrap{ padding:32px 20px 56px !important; }\n      .es-title{ font-size:56px !important; }\n      .es-hero{ grid-template-columns:1fr !important; gap:26px !important; padding:30px 28px !important; }\n      .es-buffernum{ font-size:62px !important; }\n      .es-stats{ grid-template-columns:repeat(2,1fr) !important; }\n      .es-countries{ grid-template-columns:1fr !important; }\n      .es-charts{ grid-template-columns:1fr !important; gap:26px !important; }\n    }\n    /* ---- Phone ---- */\n    @media (max-width:560px){\n      .es-wrap{ padding:22px 14px 48px !important; }\n      .es-head{ flex-direction:column !important; align-items:flex-start !important; gap:18px !important; }\n      .es-headright{ align-items:flex-start !important; }\n      .es-title{ font-size:46px !important; }\n      .es-buffernum{ font-size:50px !important; }\n      .es-hero{ padding:24px 20px !important; }\n      .es-stats{ grid-template-columns:1fr !important; }\n      .es-controls{ flex-direction:column !important; align-items:stretch !important; }\n      .es-ledhead{ display:none !important; }\n      .es-ledrow{\n        grid-template-columns:1fr auto auto !important;\n        grid-template-areas:\"name name del\" \"city amt usd\" \"status status status\" !important;\n        row-gap:9px !important; column-gap:10px !important; padding:15px 18px !important;\n      }\n      .es-c-name{ grid-area:name !important; }\n      .es-c-city{ grid-area:city !important; justify-self:start !important; }\n      .es-c-amt{ grid-area:amt !important; justify-self:end !important; }\n      .es-c-usd{ grid-area:usd !important; }\n      .es-c-status{ grid-area:status !important; text-align:left !important; }\n      .es-c-del{ grid-area:del !important; opacity:1 !important; justify-self:end !important; }\n      .es-logform{ flex-direction:column !important; align-items:stretch !important; }\n      .es-logform > *{ width:100% !important; }\n      .es-logrow{\n        grid-template-columns:1fr auto auto !important;\n        grid-template-areas:\"desc desc del\" \"city amt usd\" !important;\n        row-gap:9px !important; column-gap:10px !important; padding:14px 18px !important;\n      }\n      .es-lg-desc{ grid-area:desc !important; }\n      .es-lg-city{ grid-area:city !important; justify-self:start !important; }\n      .es-lg-amt{ grid-area:amt !important; justify-self:end !important; }\n      .es-lg-usd{ grid-area:usd !important; }\n      .es-lg-del{ grid-area:del !important; opacity:1 !important; justify-self:end !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"es-wrap\" style=\"min-height:100vh; background:#FFF6EA; font-family:'Space Grotesk',system-ui,sans-serif; color:#17110A; padding:40px 28px 72px; -webkit-font-smoothing:antialiased;\">\n  <div style=\"max-width:1140px; margin:0 auto;\">\n\n    <!-- HEADER -->\n    <div class=\"es-head\" style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap; margin-bottom:30px;\">\n      <div>\n        <div style=\"display:flex; align-items:center; gap:14px;\">\n          <div style=\"width:34px; height:34px; border-radius:50%; background:#FFB400; box-shadow:0 0 0 6px rgba(255,180,0,0.18);\"><\u002Fdiv>\n          <div style=\"font-size:13px; letter-spacing:0.34em; font-weight:600; color:#C0431F;\">SUMMER BUDGET · 2026<\u002Fdiv>\n        <\u002Fdiv>\n        <h1 class=\"es-title\" style=\"margin:14px 0 0; font-size:72px; line-height:0.92; font-weight:700; letter-spacing:-0.03em;\">EURO<br>SUMMER<\u002Fh1>\n        <div style=\"margin-top:14px; font-size:16px; color:#6B5B45; font-weight:500;\">3 countries · 4 cities · one four-week Adriatic loop. Everything is editable and auto-saved.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"es-headright\" style=\"display:flex; flex-direction:column; align-items:flex-end; gap:10px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; background:#17110A; color:#FFF6EA; padding:10px 16px 10px 18px; border-radius:999px; font-family:'Space Mono',monospace; font-size:15px; font-weight:700;\">\n          <span style=\"color:#FFB400;\">€1<\u002Fspan><span style=\"opacity:0.45;\">=<\u002Fspan><span style=\"opacity:0.75;\">$<\u002Fspan>\n          <input class=\"es-inp es-num\" style=\"width:58px; color:#FFF6EA;\" value=\"{{ rateVal }}\" onchange=\"{{ onRate }}\" type=\"number\" step=\"0.01\">\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:7px; font-size:12px; letter-spacing:0.06em; color:#7FAE7F; font-weight:600;\">\n          <span style=\"width:7px; height:7px; border-radius:50%; background:#2FCB86;\"><\u002Fspan>{{ savedLabel }}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HERO: THE BUFFER -->\n    <div class=\"es-hero\" style=\"background:#17110A; border-radius:30px; padding:36px 40px; color:#FFF6EA; display:grid; grid-template-columns:1.1fr 1fr; gap:40px; align-items:center; margin-bottom:18px; overflow:hidden;\">\n      <div>\n        <div style=\"font-size:12px; letter-spacing:0.32em; font-weight:600; color:{{ accentColor }};\">THE BUFFER<\u002Fdiv>\n        <div class=\"es-buffernum\" style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:84px; line-height:1; letter-spacing:-0.03em; margin:10px 0 0; color:{{ bufferColor }};\">{{ bufferStr }}<\u002Fdiv>\n        <div style=\"font-size:15px; color:#C8B89E; max-width:420px; margin-top:14px; line-height:1.45;\">{{ bufferCaption }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"display:flex; justify-content:space-between; font-size:13px; color:#C8B89E; margin-bottom:10px; font-weight:500;\">\n          <span>Resources cover expenses<\u002Fspan>\n          <span style=\"font-family:'Space Mono',monospace; font-weight:700; color:#FFF6EA;\">{{ coverLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height:18px; border-radius:999px; background:rgba(255,255,255,0.10); overflow:hidden; display:flex;\">\n          <div style=\"width:{{ coverPct }}%; background:#2FCB86; transition:width .3s;\"><\u002Fdiv>\n          <div style=\"flex:1; background:#FF5C39;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:24px;\">\n          <div style=\"background:rgba(255,255,255,0.06); border-radius:16px; padding:16px 18px;\">\n            <div style=\"font-size:11px; letter-spacing:0.12em; color:#9A876B; font-weight:600;\">RESOURCES<\u002Fdiv>\n            <div style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:24px; margin-top:6px;\">{{ resourcesStr }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,0.06); border-radius:16px; padding:16px 18px;\">\n            <div style=\"font-size:11px; letter-spacing:0.12em; color:#9A876B; font-weight:600;\">EXPENSES<\u002Fdiv>\n            <div style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:24px; margin-top:6px; color:#FF7A52;\">{{ expenseStr }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STAT CARDS -->\n    <div class=\"es-stats\" style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:18px;\">\n      <sc-for list=\"{{ stats }}\" as=\"stat\" hint-placeholder-count=\"4\">\n        <div style=\"background:#FFFFFF; border-radius:22px; padding:22px 22px 24px; border:1px solid #F0E4D0;\">\n          <div style=\"display:flex; align-items:center; gap:9px;\">\n            <div style=\"width:11px; height:11px; border-radius:3px; background:{{ stat.color }};\"><\u002Fdiv>\n            <div style=\"font-size:12px; letter-spacing:0.1em; font-weight:600; color:#7A6A52;\">{{ stat.label }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:32px; letter-spacing:-0.02em; margin-top:16px;\">{{ stat.value }}<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#9A876B; margin-top:6px; font-weight:500;\">{{ stat.note }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- BY COUNTRY STRIP -->\n    <div class=\"es-countries\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:34px;\">\n      <sc-for list=\"{{ countryCards }}\" as=\"cc\" hint-placeholder-count=\"3\">\n        <div style=\"background:{{ cc.bg }}; border-radius:22px; padding:22px 24px; position:relative; overflow:hidden;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n            <div style=\"display:flex; align-items:center; gap:11px;\">\n              <span style=\"font-size:30px; line-height:1;\">{{ cc.flag }}<\u002Fspan>\n              <div>\n                <div style=\"font-size:17px; font-weight:700; color:{{ cc.fg }};\">{{ cc.name }}<\u002Fdiv>\n \n      <\u002Fdiv>\n\n      <!-- add entry -->\n      <div style=\"background:#17110A; border-radius:20px; padding:16px 18px; margin-bottom:18px;\">\n        <div style=\"font-size:11px; letter-spacing:0.14em; font-weight:600; color:#9A876B; margin-bottom:12px;\">+ LOG AN EXPENSE<\u002Fdiv>\n        <div class=\"es-logform\" style=\"display:flex; align-items:center; gap:10px; flex-wrap:wrap;\">\n          <input class=\"es-field\" style=\"width:160px;\" type=\"date\" min=\"2026-07-03\" value=\"{{ draftDate }}\" onchange=\"{{ onDraftDate }}\">\n          <input class=\"es-field\" style=\"flex:1; min-width:180px;\" placeholder=\"What did you spend on?\" value=\"{{ draftDesc }}\" onchange=\"{{ onDraftDesc }}\" oninput=\"{{ onDraftDesc }}\">\n          <select class=\"es-field\" style=\"width:150px; font-weight:600; cursor:pointer;\" value=\"{{ draftCity }}\" onchange=\"{{ onDraftCity }}\">\n            <sc-for list=\"{{ logCityOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n              <option value=\"{{ opt }}\">{{ opt }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fselect>\n          <div style=\"display:flex; align-items:center; gap:6px;\">\n            <button onclick=\"{{ onDraftCurrency }}\" style=\"cursor:pointer; font-family:'Space Mono',monospace; font-weight:700; font-size:15px; width:38px; height:42px; border-radius:11px; border:none; background:{{ draftCurBg }}; color:{{ draftCurFg }};\">{{ draftCurSym }}<\u002Fbutton>\n            <input class=\"es-field es-num\" style=\"width:110px;\" type=\"number\" step=\"0.5\" placeholder=\"0.00\" value=\"{{ draftAmt }}\" onchange=\"{{ onDraftAmt }}\" oninput=\"{{ onDraftAmt }}\">\n          <\u002Fdiv>\n          <button onclick=\"{{ onAddLog }}\" style=\"cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; padding:12px 22px; border-radius:13px; border:none; background:#FFB400; color:#17110A;\">Log it<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- days -->  class=\"es-sel es-lg-city\" style=\"font-size:12.5px; color:{{ e.cityColor }};\" value=\"{{ e.city }}\" onchange=\"{{ e.onCity }}\">\n                  <sc-for list=\"{{ logCityOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n                    <option value=\"{{ opt }}\">{{ opt }}<\u002Foption>\n                  <\u002Fsc-for>\n                <\u002Fselect>\n                <div class=\"es-lg-amt\" style=\"display:flex; align-items:center; gap:4px;\">\n                  <button onclick=\"{{ e.onCurrency }}\" style=\"cursor:pointer; font-family:'Space Mono',monospace; font-weight:700; font-size:14px; width:24px; height:26px; border-radius:7px; border:none; background:{{ e.curBg }}; color:{{ e.curFg }};\">{{ e.curSym }}<\u002Fbutton>\n                  <input class=\"es-inp es-num\" style=\"font-size:13.5px; color:#3A2E1C; max-width:78px;\" value=\"{{ e.amt }}\" onchange=\"{{ e.onAmount }}\" type=\"number\" step=\"0.5\">\n                <\u002Fdiv>\n                <div class=\"es-lg-usd\" style=\"text-align:right; font-family:'Space Mono',monospace; font-size:14.5px; font-weight:700; color:#2A2014;\">{{ e.usdStr }}<\u002Fdiv>\n                <button class=\"es-del es-lg-del\" onclick=\"{{ e.onDelete }}\" style=\"cursor:pointer; border:none; background:transparent; color:#C9442A; font-size:18px; line-height:1; padding:0;\" title=\"Delete\">×<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:22px; font-size:12.5px; color:#9A876B; text-align:center; font-weight:500;\">EUR amounts converted at €1 = ${{ rateVal }}. Everything is saved on this device — “Reset all” restores the original plan and clears your log.<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:2400},&quot;rate&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:1.18,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:0.8,&quot;max&quot;:1.5,&quot;step&quot;:0.01},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Sunset&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;Sunset&quot;,&quot;Adriatic&quot;,&quot;Gelato&quot;]},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Comfortable&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;Comfortable&quot;,&quot;Compact&quot;]}}\">\nclass Component extends DCLogic {\n  KEY = 'euro_summer_budget_v2';\n\n  cityCountry = { 'Vienna':'Austria','Zagreb':'Croatia','Ljubljana':'Slovenia','Zadar/Biograd':'Croatia','—':'Pre-trip' };\n  countryFlag = { 'Austria':'\\uD83C\\uDDE6\\uD83C\\uDDF9','Croatia':'\\uD83C\\uDDED\\uD83C\\uDDF7','Slovenia':'\\uD83C\\uDDF8\\uD83C\\uDDEE','Pre-trip':'\\uD83C\\uDFE0' };\n  countryColor = { 'Austria':'#FF5C39','Croatia':'#1AA7D0','Slovenia':'#FF4D8D','Pre-trip':'#9A876B' };\n  cityColors = { 'Vienna':'#FF5C39','Zagreb':'#1AA7D0','Ljubljana':'#FF4D8D','Zadar/Biograd':'#E69400','—':'#9A876B' };\n  cityBg = { 'Vienna':'#FFE7DF','Zagreb':'#DBF1F8','Ljubljana':'#FFE2EC','Zadar/Biograd':'#FBEFD4','—':'#F0E4D0' };\n\n  seedRows() {\n    return [\n      ['Starting','Cash','—',200,'USD','Paid'],\n      ['Starting','Debit / Bank Card','—',1105,'USD','Paid'],\n      ['Starting','Credit Card (Emergency)','—',90,'USD','Paid'],\n      ['Inflows','Zagreb Arrival Cash','Zagreb',50,'EUR','Pending'],\n      ['Fixed','Return Flight — Vienna','Vienna',370,'USD','Paid'],\n      ['Fixed','Vienna Hotel','Vienna',150,'USD','Pending'],\n      ['Fixed','Flixbus to Zagreb','Vienna',44,'USD','Pending'],\n      ['Fixed','Bus to Ljubljana','Zagreb',15,'EUR','Pending'],\n      ['Fixed','Ljubljana Accommodation','Ljubljana',150,'USD','Pending'],\n      ['Fixed','Rental Car (Ljubljana, ⅓ share)','Ljubljana',80,'EUR','Pending'],\n      ['Fixed','Bus back to Zagreb','Ljubljana',15,'EUR','Pending'],\n      ['Fixed','Zadar / Biograd Weekend (Gas & Food)','Zadar/Biograd',100,'USD','Pending'],\n      ['Fixed','Bus back to Vienna (Return flight)','Zagreb',38,'EUR','Pending'],\n      ['Variable','Vienna Food & Drinks (2 days @ $50)','Vienna',100,'USD','Pending'],\n      ['Variable','Zagreb Food & Coffee — Week 1 (7 days @ $20)','Zagreb',140,'USD','Pending'],\n      ['Variable','Ljubljana Food (2 days @ $25)','Ljubljana',50,'USD','Pending'],\n      ['Variable','Zagreb Food & Coffee — Weeks 2 & 3 (14 days @ $20)','Zagreb',280,'USD','Pending'],\n    ].map((r, i) => ({ id: i + 1, cat: r[0], item: r[1], city: r[2], amt: r[3], cur: r[4], status: r[5] }));\n  }\n\n  seedLog() {\n    return [\n      { id: 50, date: '2026-07-03', desc: 'Coffee & burek', city: 'Zagreb', amt: 6.5, cur: 'EUR' },\n      { id: 51, date: '2026-07-03', desc: 'Groceries (Konzum)', city: 'Zagreb', amt: 18, cur: 'EUR' },\n    ];\n  }\n\n  makeDefaults() {\n    return {\n      rows: this.seedRows(),\n      rate: null, filter: 'All', hidePaid: false, groupBy: 'Category',\n      log: this.seedLog(),\n      nextId: 100,\n      logDraft: { date: '2026-07-03', desc: '', city: 'Zagreb', amt: '', cur: 'EUR' },\n    };\n  }\n\n  load() {\n    try {\n      const raw = window.localStorage.getItem(this.KEY);\n      if (!raw) return null;\n      return JSON.parse(raw);\n    } catch (e) { return null; }\n  }\n  persist() {\n    try {\n      const { rows, rate, filter, hidePaid, groupBy, log, nextId, logDraft } = this.state;\n      window.localStorage.setItem(this.KEY, JSON.stringify({ rows, rate, filter, hidePaid, groupBy, log, nextId, logDraft }));\n    } catch (e) {}\n  }\n\n  constructor(props) {\n    super(props);\n    const saved = this.load();\n    this.state = saved ? { ...this.makeDefaults(), ...saved } : this.makeDefaults();\n  }\n\n  componentDidUpdate() { this.persist(); }\n\n  fmtUSD(n) {\n    const sign = n < 0 ? '\\u2212' : '';\n    return sign + '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });\n  }\n\n  // ledger ops\n  update(id, field, value) { this.setState(s => ({ rows: s.rows.map(r => r.id === id ? { ...r, [field]: value } : r) })); }\n  remove(id) { this.setState(s => ({ rows: s.rows.filter(r => r.id !== id) })); }\n  add(cat, city) {\n    this.setState(s => ({\n      rows: [...s.rows, { id: s.nextId, cat, item: 'New item', city, amt: 0, cur: 'USD', status: cat === 'Starting' ? 'Paid' : 'Pending' }],\n      nextId: s.nextId + 1,\n    }));\n  }\n\n  // log ops\n  setDraft(field, value) { this.setState(s => ({ logDraft: { ...s.logDraft, [field]: value } })); }\n  addLog() {\n    this.setState(s => {\n      const d = s.logDraft;\n      const amt = parseFloat(d.amt);\n      if (isNaN(amt)) return null;\n      return {\n        log: [...s.log, { id: s.nextId, date: d.date || '2026-07-03', desc: (d.desc || '').trim() || 'Expense', city: d.city, amt, cur: d.cur }],\n        nextId: s.nextId + 1,\n        logDraft: { ...s.logDraft, desc: '', amt: '' },\n      };\n    });\n  }\n  updateLog(id, field, value) { this.setState(s => ({ log: s.log.map(e => e.id === id ? { ...e, [field]: value } : e) })); }\n  removeLog(id) { this.setState(s => ({ log: s.log.filter(e => e.id !== id) })); }\n\n  reset() {\n    try { window.localStorage.removeItem(this.KEY); } catch (e) {}\n    this.setState(this.makeDefaults());\n  }\n\n  renderVals() {\n    const rate = this.state.rate ?? this.props.rate ?? 1.18;\n    const groupBy = this.state.groupBy;\n    const accentMap = { Sunset: '#FF5C39', Adriatic: '#1AA7D0', Gelato: '#FF4D8D' };\n    const accentColor = accentMap[this.props.accent] ?? '#FF5C39';\n    const density = this.props.density ?? 'Comfortable';\n    const pad = density === 'Compact' ? '8px' : '12px';\n    const cityOptions = ['—','Vienna','Zagreb','Ljubljana','Zadar/Biograd'];\n    const logCityOptions = ['Vienna','Zagreb','Ljubljana','Zadar/Biograd'];\n\n    const rows = this.state.rows.map(r => ({ ...r, usd: (r.cur === 'EUR' ? Number(r.amt || 0) * rate : Number(r.amt || 0)) }));\n\n    const sumOf = (cat) => rows.filter(r => r.cat === cat).reduce((a, r) => a + r.usd, 0);\n    const starting = sumOf('Starting'), inflows = sumOf('Inflows'), fixed = sumOf('Fixed'), variable = sumOf('Variable');\n    const expenses = fixed + variable;\n    const resources = starting + inflows;\n    const buffer = resources - expenses;\n    const paidExpenses = rows.filter(r => (r.cat === 'Fixed' || r.cat === 'Variable') && r.status === 'Paid').reduce((a, r) => a + r.usd, 0);\n    const availableNow = starting - paidExpenses;\n\n    const coverPct = expenses > 0 ? Math.max(0, Math.min(100, (resources / expenses) * 100)) : 100;\n    const coverLabel = expenses > 0 ? Math.round((resources / expenses) * 100) + '%' : '—';\n    const bufferColor = buffer < 0 ? '#FF7A52' : '#2FCB86';\n    const bufferCaption = buffer < 0\n      ? 'You\\u2019re projected ' + this.fmtUSD(Math.abs(buffer)) + ' over. Trim a few pending costs or top up the bank card before you fly.'\n      : 'Comfortable margin \\u2014 every planned expense is covered with room to spare.';\n\n    const stats = [\n      { label:'STARTING FUNDS', value:this.fmtUSD(starting), note:'Cash, debit & emergency card', color:'#2FCB86' },\n      { label:'INFLOWS', value:this.fmtUSD(inflows), note:'Cash collected on arrival', color:'#1AA7D0' },\n      { label:'EXPECTED EXPENSES', value:this.fmtUSD(expenses), note:'Fixed + variable, all cities', color:'#FF5C39' },\n      { label:'PLANNED BUFFER', value:this.fmtUSD(buffer), note: buffer < 0 ? 'Over budget — adjust' : 'Room to spare', color:'#FFB400' },\n    ];\n\n    const expRows = rows.filter(r => r.cat === 'Fixed' || r.cat === 'Variable');\n    const countryDefs = [\n      { name:'Austria', cities:'Vienna' },\n      { name:'Croatia', cities:'Zagreb · Zadar' },\n      { name:'Slovenia', cities:'Ljubljana' },\n    ];\n    const cardBg = { 'Austria':'#FFE7DF','Croatia':'#DBF1F8','Slovenia':'#FFE2EC' };\n    const cardFg = { 'Austria':'#A8351A','Croatia':'#0E6E8C','Slovenia':'#B02A5F' };\n    const countryCards = countryDefs.map(d => {\n      const usd = expRows.filter(r => this.cityCountry[r.city] === d.name).reduce((a, r) => a + r.usd, 0);\n      const share = expenses > 0 ? Math.round((usd / expenses) * 100) : 0;\n      return { name:d.name, cities:d.cities, flag:this.countryFlag[d.name], usdStr:this.fmtUSD(usd),\n        sharePct:share, color:this.countryColor[d.name], bg:cardBg[d.name], fg:cardFg[d.name], muted:cardFg[d.name] };\n    });\n\n    const routeNames = ['Vienna','Zagreb','Ljubljana','Zadar/Biograd','Zagreb','Vienna'];\n    const route = routeNames.map((n, i) => ({ name:n, color:this.cityColors[n], bg:this.cityBg[n],\n      flag:this.countryFlag[this.cityCountry[n]], arrow: i < routeNames.length - 1 ? '\\u2192' : '' }));\n\n    const chartDim = groupBy === 'Country' ? 'Country' : 'City';\n    const spendTitle = 'SPEND BY ' + chartDim.toUpperCase();\n    let spendBars;\n    if (chartDim === 'Country') {\n      const max = Math.max(1, ...countryDefs.map(d => expRows.filter(r => this.cityCountry[r.city] === d.name).reduce((a, r) => a + r.usd, 0)));\n      spendBars = countryDefs.map(d => {\n        const usd = expRows.filter(r => this.cityCountry[r.city] === d.name).reduce((a, r) => a + r.usd, 0);\n        return { name:d.name, usdStr:this.fmtUSD(usd), color:this.countryColor[d.name], widthPct:(usd / max) * 100 };\n      });\n    } else {\n      const cityList = ['Vienna','Zagreb','Ljubljana','Zadar/Biograd'];\n      const max = Math.max(1, ...cityList.map(c => expRows.filter(r => r.city === c).reduce((a, r) => a + r.usd, 0)));\n      spendBars = cityList.map(c => {\n        const usd = expRows.filter(r => r.city === c).reduce((a, r) => a + r.usd, 0);\n        return { name:c, usdStr:this.fmtUSD(usd), color:this.cityColors[c], widthPct:(usd / max) * 100 };\n      });\n    }\n\n    const splitMax = Math.max(1, fixed, variable);\n    const splitBars = [\n      { name:'Fixed costs', usdStr:this.fmtUSD(fixed), color:'#FF5C39', widthPct:(fixed / splitMax) * 100 },\n      { name:'Variable costs', usdStr:this.fmtUSD(variable), color:'#FF4D8D', widthPct:(variable / splitMax) * 100 },\n    ];\n\n    const catMeta = {\n      Starting:{ title:'Starting Funds', color:'#13A86A' }, Inflows:{ title:'Inflows', color:'#1AA7D0' },\n      Fixed:{ title:'Fixed Costs', color:'#FF5C39' }, Variable:{ title:'Variable Costs', color:'#FF4D8D' },\n    };\n    let order, keyFn, metaFn, addFn, shortFn;\n    if (groupBy === 'Category') {\n      order = ['Starting','Inflows','Fixed','Variable'];\n      keyFn = r => r.cat;\n      metaFn = k => ({ title:catMeta[k].title, color:catMeta[k].color, flag:'', isFlag:false });\n      addFn = k => this.add(k, k === 'Starting' ? '—' : (k === 'Inflows' ? 'Zagreb' : 'Vienna'));\n      shortFn = k => k;\n    } else if (groupBy === 'City') {\n      order = ['Vienna','Zagreb','Ljubljana','Zadar/Biograd','—'];\n      keyFn = r => r.city;\n      metaFn = k => ({ title: k === '—' ? 'Pre-trip / Home' : k, color:this.cityColors[k],\n        flag:this.countryFlag[this.cityCountry[k]], isFlag:true });\n      addFn = k => this.add(k === '—' ? 'Starting' : 'Variable', k);\n      shortFn = k => k === '—' ? 'Pre-trip' : k;\n    } else {\n      order = ['Austria','Croatia','Slovenia','Pre-trip'];\n      keyFn = r => this.cityCountry[r.city];\n      metaFn = k => ({ title:k, color:this.countryColor[k], flag:this.countryFlag[k], isFlag:true });\n      addFn = k => this.add(k === 'Pre-trip' ? 'Starting' : 'Variable',\n        ({ Austria:'Vienna', Croatia:'Zagreb', Slovenia:'Ljubljana', 'Pre-trip':'—' })[k]);\n      shortFn = k => k;\n    }\n\n    const presentKeys = [];\n    rows.forEach(r => { const k = keyFn(r); if (!presentKeys.includes(k)) presentKeys.push(k); });\n    const orderedKeys = order.filter(k => presentKeys.includes(k)).concat(presentKeys.filter(k => !order.includes(k)));\n\n    const allSections = orderedKeys.map(k => {\n      const meta = metaFn(k);\n      const groupRows = rows.filter(r => keyFn(r) === k);\n      const subtotal = groupRows.reduce((a, r) => a + r.usd, 0);\n      const shown = this.state.hidePaid ? groupRows.filter(r => r.status !== 'Paid') : groupRows;\n      const itemVals = shown.map(r => {\n        const paid = r.status === 'Paid';\n        const isFunds = r.cat === 'Starting' || r.cat === 'Inflows';\n        return {\n          id:r.id, name:r.item, city:r.city, cityColor:this.cityColors[r.city] || '#7A6A52',\n          curSym: r.cur === 'EUR' ? '\\u20AC' : '$',\n          curBg: r.cur === 'EUR' ? '#E6F2D9' : '#FFE7DF',\n          curFg: r.cur === 'EUR' ? '#4E7A1E' : '#C0431F',\n          amt:r.amt, usdStr:this.fmtUSD(r.usd), usdColor: isFunds ? '#13A86A' : '#2A2014',\n          status:r.status, statusFg: paid ? '#0E8A55' : '#B5750A', statusBg: paid ? '#E2F7EE' : '#FFF1D6', pad,\n          onName:(e)=>this.update(r.id,'item',e.target.value),\n          onCity:(e)=>this.update(r.id,'city',e.target.value),\n          onAmount:(e)=>this.update(r.id,'amt',e.target.value),\n          onCurrency:()=>this.update(r.id,'cur', r.cur === 'EUR' ? 'USD' : 'EUR'),\n          onStatus:()=>this.update(r.id,'status', paid ? 'Pending' : 'Paid'),\n          onDelete:()=>this.remove(r.id),\n        };\n      });\n      return {\n        key:k, title:meta.title, color:meta.color, flag:meta.flag,\n        flagDisplay: meta.isFlag ? 'inline' : 'none', dotDisplay: meta.isFlag ? 'none' : 'block',\n        countLabel: groupRows.length + (groupRows.length === 1 ? ' item' : ' items'),\n        subtotalStr:this.fmtUSD(subtotal), items:itemVals,\n        addLabel: '+ Add to ' + meta.title, onAdd: () => addFn(k),\n        shortLabel: (meta.isFlag ? meta.flag + ' ' : '') + shortFn(k),\n      };\n    });\n\n    const visibleSections = this.state.filter === 'All' ? allSections : allSections.filter(s => s.key === this.state.filter);\n\n    const groupControls = ['Category','City','Country'].map(g => {\n      const active = groupBy === g;\n      const style = 'cursor:pointer; font-family:inherit; font-size:13px; font-weight:600; padding:7px 15px; border-radius:999px; border:none; background:'\n        + (active ? '#17110A' : 'transparent') + '; color:' + (active ? '#FFF6EA' : '#7A6A52') + '; transition:all .12s;';\n      return { label:g, style, onClick: () => this.setState({ groupBy:g, filter:'All' }) };\n    });\n\n    const filterDefs = [{ key:'All', label:'All' }].concat(allSections.map(s => ({ key:s.key, label:s.shortLabel })));\n    const filters = filterDefs.map(f => {\n      const active = this.state.filter === f.key;\n      const style = 'cursor:pointer; font-family:inherit; font-size:13.5px; font-weight:600; padding:9px 16px; border-radius:999px; border:1px solid '\n        + (active ? '#17110A' : '#E6D8C2') + '; background:' + (active ? '#17110A' : '#FFFFFF')\n        + '; color:' + (active ? '#FFF6EA' : '#6B5B45') + '; transition:all .12s;';\n      return { key:f.key, label:f.label, style, onClick: () => this.setState({ filter: f.key }) };\n    });\n\n    const paidBtnLabel = this.state.hidePaid ? 'Show paid items' : 'Hide paid items';\n    const paidBtnStyle = 'cursor:pointer; font-family:inherit; font-size:13.5px; font-weight:600; padding:9px 17px; border-radius:999px; border:1px solid '\n      + (this.state.hidePaid ? accentColor : '#E6D8C2') + '; background:' + (this.state.hidePaid ? accentColor : '#FFFFFF')\n      + '; color:' + (this.state.hidePaid ? '#FFFFFF' : '#6B5B45') + ';';\n\n    // ---------- DAILY LOG ----------\n    const logRows = this.state.log.map(e => ({ ...e, usd: (e.cur === 'EUR' ? Number(e.amt || 0) * rate : Number(e.amt || 0)) }));\n    const loggedTotal = logRows.reduce((a, e) => a + e.usd, 0);\n    const byDate = {};\n    logRows.forEach(e => { (byDate[e.date] = byDate[e.date] || []).push(e); });\n    const dayKeys = Object.keys(byDate).sort();\n    const fmtDay = (iso) => {\n      const dt = new Date(iso + 'T00:00:00');\n      return dt.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });\n    };\n    const logDays = dayKeys.map(d => {\n      const items = byDate[d];\n      const total = items.reduce((a, e) => a + e.usd, 0);\n      const dt = new Date(d + 'T00:00:00');\n      const wd = dt.getDay();\n      const color = (wd === 0 || wd === 6) ? '#FF4D8D' : '#1AA7D0';\n      return {\n        date:d, label:fmtDay(d), color,\n        countLabel: items.length + (items.length === 1 ? ' expense' : ' expenses'),\n        totalStr:this.fmtUSD(total),\n        items: items.map(e => ({\n          id:e.id, desc:e.desc, city:e.city, cityColor:this.cityColors[e.city] || '#7A6A52',\n          curSym: e.cur === 'EUR' ? '\\u20AC' : '$',\n          curBg: e.cur === 'EUR' ? '#E6F2D9' : '#FFE7DF',\n          curFg: e.cur === 'EUR' ? '#4E7A1E' : '#C0431F',\n          amt:e.amt, usdStr:this.fmtUSD(e.usd),\n          onDesc:(ev)=>this.updateLog(e.id,'desc',ev.target.value),\n          onCity:(ev)=>this.updateLog(e.id,'city',ev.target.value),\n          onAmount:(ev)=>this.updateLog(e.id,'amt',ev.target.value),\n          onCurrency:()=>this.updateLog(e.id,'cur', e.cur === 'EUR' ? 'USD' : 'EUR'),\n          onDelete:()=>this.removeLog(e.id),\n        })),\n      };\n    });\n    const daysLogged = dayKeys.length;\n    const avgPerDay = daysLogged ? loggedTotal / daysLogged : 0;\n    const cashLeft = resources - loggedTotal;\n\n    const logStats = [\n      { label:'LOGGED SO FAR', value:this.fmtUSD(loggedTotal), note: daysLogged + (daysLogged === 1 ? ' day tracked' : ' days tracked'),\n        bg:'#FFE7DF', labelColor:'#A8351A', valueColor:'#17110A', noteColor:'#A8351A' },\n      { label:'AVG / DAY', value:this.fmtUSD(avgPerDay), note:'Across logged days',\n        bg:'#DBF1F8', labelColor:'#0E6E8C', valueColor:'#17110A', noteColor:'#0E6E8C' },\n      { label:'CASH LEFT', value:this.fmtUSD(cashLeft), note:'Resources minus logged spend',\n        bg:'#E2F7EE', labelColor:'#0E8A55', valueColor: cashLeft < 0 ? '#C0431F' : '#0E8A55', noteColor:'#0E8A55' },\n      { label:'vs PLANNED', value: expenses > 0 ? Math.round((loggedTotal / expenses) * 100) + '%' : '—', note:'Of planned expenses spent',\n        bg:'#FFF0D6', labelColor:'#B5750A', valueColor:'#17110A', noteColor:'#B5750A' },\n    ];\n\n    const d = this.state.logDraft;\n\n    return {\n      rateVal: rate, savedLabel: 'Saved on this device', accentColor,\n      bufferStr:this.fmtUSD(buffer), bufferColor, bufferCaption, coverPct, coverLabel,\n      resourcesStr:this.fmtUSD(resources), expenseStr:this.fmtUSD(expenses),\n      stats, countryCards, route, spendTitle, spendBars, splitBars, cityOptions,\n      groupControls, filters, visibleSections,\n      togglePaid: () => this.setState(s => ({ hidePaid: !s.hidePaid })), paidBtnLabel, paidBtnStyle,\n      onRate:(e)=>{ const v = parseFloat(e.target.value); this.setState({ rate: isNaN(v) ? 0 : v }); },\n      onReset:()=>this.reset(),\n      // daily log\n      logStats, logDays, logCityOptions, logEmpty: logRows.length === 0,\n      draftDate:d.date, draftDesc:d.desc, draftCity:d.city, draftAmt:d.amt,\n      draftCurSym: d.cur === 'EUR' ? '\\u20AC' : '$',\n      draftCurBg: d.cur === 'EUR' ? '#E6F2D9' : '#FFE7DF',\n      draftCurFg: d.cur === 'EUR' ? '#4E7A1E' : '#C0431F',\n      onDraftDate:(e)=>this.setDraft('date', e.target.value),\n      onDraftDesc:(e)=>this.setDraft('desc', e.target.value),\n      onDraftCity:(e)=>this.setDraft('city', e.target.value),\n      onDraftAmt:(e)=>this.setDraft('amt', e.target.value),\n      onDraftCurrency:()=>this.setDraft('cur', d.cur === 'EUR' ? 'USD' : 'EUR'),\n      onAddLog:()=>this.addLog(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Euro Summer Budget.dc"}
